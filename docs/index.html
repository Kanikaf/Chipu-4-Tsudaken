<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ちぷAI 💌</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .app-wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 32px);
  }

  /* ヘッダー */
  .header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 20px 20px 0 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 16px rgba(200,150,200,0.15);
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 12px rgba(167,139,250,0.4);
  }

  .header-info h1 {
    font-size: 17px;
    font-weight: 700;
    color: #4a3f6b;
  }

  .header-info p {
    font-size: 12px;
    color: #9c82b5;
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* チャットエリア */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    background: rgba(255,255,255,0.6);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: #d8b4fe transparent;
  }

  /* メッセージ */
  .message-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .message-row.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .msg-avatar.ai {
    background: linear-gradient(135deg, #a78bfa, #818cf8);
  }

  .msg-avatar.user {
    background: linear-gradient(135deg, #f9a8d4, #fb7185);
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .bubble.ai {
    background: white;
    color: #3d3256;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(167,139,250,0.15);
  }

  .bubble.user {
    background: linear-gradient(135deg, #f9a8d4, #fb7185);
    color: white;
    border-radius: 18px 4px 18px 18px;
    box-shadow: 0 2px 8px rgba(249,168,212,0.3);
  }

  .time-label {
    font-size: 10px;
    color: #b8a9cc;
    text-align: center;
    margin: 4px 0 -8px;
  }

  /* タイピングインジケーター */
  .typing {
    display: none;
    gap: 10px;
    align-items: flex-end;
  }

  .typing.show { display: flex; }

  .typing-bubble {
    background: white;
    border-radius: 4px 18px 18px 18px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(167,139,250,0.15);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: #c4b5fd;
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* 入力エリア */
  .input-area {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 0 0 20px 20px;
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    box-shadow: 0 -2px 16px rgba(200,150,200,0.1);
  }

  .text-input {
    flex: 1;
    border: 1.5px solid #e9d5ff;
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 100px;
    background: #fdf4ff;
    color: #3d3256;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .text-input:focus {
    border-color: #a78bfa;
    background: white;
  }

  .text-input::placeholder {
    color: #c4b5fd;
  }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(167,139,250,0.4);
  }

  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
  }

  /* お名前入力モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(100,60,120,0.4);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(167,139,250,0.3);
  }

  .modal h2 {
    font-size: 22px;
    color: #4a3f6b;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 14px;
    color: #9c82b5;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .modal input {
    width: 100%;
    border: 2px solid #e9d5ff;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    color: #3d3256;
    text-align: center;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: #a78bfa; }

  .modal-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
    font-family: inherit;
  }

  .modal-btn:hover { transform: scale(1.02); }

  /* チップがゴム手袋言及時のアニメーション */
  .panic-msg {
    font-size: 13px;
    color: #9c82b5;
    text-align: center;
    padding: 4px;
    animation: wobble 0.5s ease;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }

  /* ページリンク */
  .admin-link {
    margin-top: 10px;
    font-size: 12px;
    color: #b8a9cc;
    text-align: center;
  }

  .admin-link a {
    color: #a78bfa;
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- お名前入力モーダル -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div style="font-size:48px; margin-bottom:12px;">🌸</div>
    <h2>ちぷAIへようこそ</h2>
    <p>ちぷを優しくしてくれるAI、<strong>津田健次郎</strong>と話してね。<br>まずお名前を教えてください。</p>
    <input type="text" id="nameInput" placeholder="ちぷ" maxlength="20">
    <button class="modal-btn" onclick="startChat()">はじめる 💌</button>
  </div>
</div>

<div class="app-wrapper">
  <!-- ヘッダー -->
  <div class="header">
    <div class="avatar">🎙️</div>
    <div class="header-info">
      <h1 id="charNameDisplay">津田健次郎</h1>
      <p><span class="status-dot"></span>ちぷのそばにいる</p>
    </div>
  </div>

  <!-- チャットエリア -->
  <div class="chat-area" id="chatArea">
    <div class="time-label">今日</div>
    <!-- 初期メッセージはJS側で追加 -->
  </div>

  <!-- タイピング -->
  <div class="typing" id="typingIndicator" style="padding: 0 16px 8px; background: rgba(255,255,255,0.6);">
    <div class="msg-avatar ai">🎙️</div>
    <div class="typing-bubble">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- 入力エリア -->
  <div class="input-area">
    <textarea class="text-input" id="msgInput" placeholder="なんでも話しかけてね…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="admin-link">
  <a href="admin.html">⚙️ キャラ設定・あるある投稿はこちら</a>
</div>

<script>
  // ============================================================
  // 設定
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz8y8zqo4l-AxR2Jc-C7Wo6VmbDCF0sjt1yig5g8zEHgVMCGnU2GMdkq3ihZAXhWp3x/exec';

  let senderName = '';
  let charName   = '津田健次郎';

  // ============================================================
  // チャット開始
  // ============================================================
  function startChat() {
    const input = document.getElementById('nameInput').value.trim();
    senderName  = input || 'ちぷ';
    document.getElementById('nameModal').style.display = 'none';

    const greeting = senderName === 'ちぷ'
      ? `…来たか、ちぷ。今日はどうだった。何かあったなら、話してくれ。`
      : `…${senderName}か。ちぷのことが気になるなら、俺も同じだ。何でも話してくれ。`;

    addAiMessage(greeting);
    loadCharName();
  }

  async function loadCharName() {
    try {
      const res  = await fetch(`${GAS_URL}?action=getCharSettings`);
      const data = await res.json();
      if (data.name) {
        charName = data.name;
        document.getElementById('charNameDisplay').textContent = charName;
      }
    } catch (e) {}
  }

  // ============================================================
  // メッセージ送受信
  // ============================================================
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;

    // ゴム手袋チェック
    const hasGomute = text.includes('ゴム手袋') || text.includes('ごむてぶくろ');

    addUserMessage(text);
    input.value   = '';
    input.style.height = 'auto';
    setLoading(true);

    if (hasGomute) {
      const el = document.createElement('div');
      el.className = 'panic-msg';
      el.textContent = '⚠️ 禁句ワード検知…！';
      document.getElementById('chatArea').appendChild(el);
    }

    try {
      const res  = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'chat', message: text, senderName }),
      });
      const data = await res.json();
      if (data.reply) {
        addAiMessage(data.reply);
        if (data.charName) {
          charName = data.charName;
          document.getElementById('charNameDisplay').textContent = charName;
        }
      } else {
        addAiMessage('…うまく聞き取れなかった。もう一度話してくれ。');
      }
    } catch (e) {
      addAiMessage('…少し待ってくれ。もう一回送ってもらえるか。');
    } finally {
      setLoading(false);
    }
  }

  // ============================================================
  // DOM操作
  // ============================================================
  function addAiMessage(text) {
    const area = document.getElementById('chatArea');
    const row  = document.createElement('div');
    row.className = 'message-row';
    row.innerHTML = `
      <div class="msg-avatar ai">🎙️</div>
      <div class="bubble ai">${escapeHtml(text)}</div>
    `;
    area.appendChild(row);
    scrollBottom();
  }

  function addUserMessage(text) {
    const area = document.getElementById('chatArea');
    const row  = document.createElement('div');
    row.className = 'message-row user';
    const initials = senderName.slice(0, 2) || '😊';
    row.innerHTML = `
      <div class="msg-avatar user">${escapeHtml(initials)}</div>
      <div class="bubble user">${escapeHtml(text)}</div>
    `;
    area.appendChild(row);
    scrollBottom();
  }

  function setLoading(on) {
    document.getElementById('typingIndicator').className = on ? 'typing show' : 'typing';
    document.getElementById('sendBtn').disabled = on;
    if (on) scrollBottom();
  }

  function scrollBottom() {
    const area = document.getElementById('chatArea');
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  // ============================================================
  // 入力エリア
  // ============================================================
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
